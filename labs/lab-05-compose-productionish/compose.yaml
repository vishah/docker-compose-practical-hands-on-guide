services:
  web:
    build: .
    expose:
      - "5000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/health').read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  inspector:
    image: alpine:3.20
    command: ["tail", "-f", "/dev/null"]
    profiles: ["debug"]

volumes:
  redis_data:
