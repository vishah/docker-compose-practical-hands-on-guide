services:
  web:
    build: .
    ports:
      - "5001:5000"
    environment:
      APP_MODE: compose-multi-service
      MESSAGE: Web talks to Redis using the service name as a hostname
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
